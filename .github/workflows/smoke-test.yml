name: Smoke Test

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  smoke-test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install --upgrade pip; python -m pip install -r requirements.txt
        shell: pwsh

      - name: Run smoke test
        run: .\scripts\smoke-test.ps1 -Port 8010 -BindHost 127.0.0.1 -PythonExe python
        shell: pwsh
