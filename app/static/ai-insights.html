<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pocket Tracker - AI Insights</title>
  <link rel="stylesheet" href="/static/css/styles.css">
  <link rel="stylesheet" href="/static/css/profile-avatar.css?v=2">
  <link rel="stylesheet" href="/static/css/app-shell.css?v=1">
</head>
<body>
  <header class="app-header">
    <div class="app-header__inner">
      <div class="app-brand">
        <span class="app-brand__eyebrow">Pocket Tracker</span>
        <p id="user-greeting" class="app-brand__greeting"></p>
      </div>
      <div class="app-header__actions">
        <a class="quick-back-link desktop-only" href="/add-transaction">Add Transaction</a>
        <a class="quick-back-link desktop-only" href="/dashboard">Dashboard</a>
      </div>
    </div>
  </header>

  <main class="page-shell">
    <div class="page-hero">
      <h1 class="page-title">AI Insights</h1>
      <p class="page-subtitle">Generate practical advice from your transaction history.</p>
    </div>

    <section class="layout-card">
      <p class="section-note">Add an optional focus prompt and generate an insight.</p>

      <div class="field">
        <label for="ai-focus">Focus (optional)</label>
        <input id="ai-focus" type="text" maxlength="120" placeholder="e.g., food spending, savings, transport">
      </div>

      <button id="generate-ai-insight" type="button" class="btn btn-block">Generate AI Insight</button>
      <p id="ai-status" class="section-note" style="margin-top: 12px;">Ready to generate insight.</p>

      <div class="insight-box">
        <p id="ai-meta" class="section-note" style="margin: 0 0 8px 0;"></p>
        <div id="ai-insight" class="markdown-content">No insight yet. Click "Generate AI Insight".</div>
      </div>
    </section>
  </main>

  <nav class="bottom-nav" aria-label="Primary">
    <a class="bottom-nav__item" data-bottom-nav-item="home" href="/dashboard">Dashboard</a>
    <a class="bottom-nav__item" data-bottom-nav-item="add" href="/add-transaction">Add</a>
    <a class="bottom-nav__item" data-bottom-nav-item="insights" href="/ai-insights">Insights</a>
  </nav>

  <script src="/static/js/shared/api-client.js?v=3"></script>
  <script src="/static/js/shared/auth.js?v=2"></script>
  <script src="/static/js/shared/profile-avatar.js?v=2"></script>
  <script src="/static/js/shared/app-shell.js?v=1"></script>
  <script src="/static/js/ai-insights.js?v=4"></script>
</body>
</html>
