<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pocket Tracker - AI Insights</title>
  <link rel="stylesheet" href="/static/css/styles.css">
  <style>
    :root {
      color-scheme: light;
      --bg: #f1f5f9;
      --card: #ffffff;
      --border: #e2e8f0;
      --text: #0f172a;
      --muted: #475569;
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      min-height: 100vh;
    }

    .page-shell {
      max-width: 860px;
      margin: 0 auto;
      padding: 32px 16px;
    }

    .top-links {
      display: flex;
      gap: 12px;
      justify-content: flex-end;
      align-items: center;
      margin-bottom: 20px;
    }

    .quick-back-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 10px 14px;
      border-radius: 10px;
      background: var(--primary);
      color: #ffffff;
      font-weight: 700;
      text-decoration: none;
    }

    .quick-back-link:hover {
      background: var(--primary-dark);
      text-decoration: none;
    }

    .page-title {
      margin: 0 0 8px;
      font-size: 2.2rem;
      line-height: 1.1;
      font-weight: 800;
    }

    .page-subtitle {
      margin: 0;
      color: var(--muted);
    }

    .layout-card {
      margin-top: 24px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      box-shadow: 0 1px 2px rgba(15, 23, 42, 0.05);
      padding: 24px;
    }

    .section-note {
      margin: 0;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .field {
      margin-top: 14px;
      max-width: 560px;
    }

    .field label {
      display: block;
      margin-bottom: 6px;
      font-size: 0.95rem;
      font-weight: 600;
      color: #334155;
    }

    .field input {
      width: 100%;
      padding: 11px 12px;
      border: 1px solid #cbd5e1;
      border-radius: 10px;
      font: inherit;
      background: white;
      color: var(--text);
    }

    .field input:focus {
      outline: 2px solid rgba(37, 99, 235, 0.25);
      border-color: var(--primary);
    }

    .btn {
      margin-top: 14px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 12px 18px;
      border: 0;
      border-radius: 10px;
      background: var(--primary);
      color: white;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }

    .btn:hover {
      background: var(--primary-dark);
    }

    .insight-box {
      margin-top: 14px;
      padding: 14px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: #f8fafc;
    }

    #ai-insight {
      margin: 0;
      white-space: pre-wrap;
      line-height: 1.5;
    }

  </style>
</head>
<body>
  <main class="page-shell">
    <div class="top-links">
      <a class="quick-back-link" href="/add-transaction">Back to Transactions</a>
    </div>

    <h1 class="page-title">AI Insights</h1>
    <p class="page-subtitle">Generate practical advice from your transaction history.</p>

    <section class="layout-card">
      <p class="section-note">Add an optional focus prompt and generate an insight.</p>

      <div class="field">
        <label for="ai-focus">Focus (optional)</label>
        <input id="ai-focus" type="text" maxlength="120" placeholder="e.g., food spending, savings, transport">
      </div>

      <button id="generate-ai-insight" type="button" class="btn">Generate AI Insight</button>
      <p id="ai-status" class="section-note" style="margin-top: 12px;">Ready to generate insight.</p>

      <div class="insight-box">
        <p id="ai-meta" class="section-note" style="margin: 0 0 8px 0;"></p>
        <p id="ai-insight">No insight yet. Click "Generate AI Insight".</p>
      </div>
    </section>
  </main>

  <script src="/static/js/add-transaction.js?v=14"></script>
</body>
</html>
