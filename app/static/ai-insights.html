<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SmartSpend AI - AI Insights</title>
  <link rel="stylesheet" href="/static/css/styles.css">
  <style>
    :root {
      color-scheme: light;
      --bg: #f1f5f9;
      --card: #ffffff;
      --border: #e2e8f0;
      --text: #0f172a;
      --muted: #475569;
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      min-height: 100vh;
    }

    .left-access {
      position: fixed;
      left: 0;
      top: 50%;
      transform: translateY(-50%);
      z-index: 20;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .left-access-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #e2e8f0;
      color: #1e293b;
      padding: 12px 16px;
      border-radius: 0 12px 12px 0;
      font-weight: 700;
      text-decoration: none;
      transition: transform 140ms ease, filter 140ms ease;
    }

    .left-access-link.active {
      background: var(--primary);
      color: #ffffff;
      box-shadow: 0 8px 20px rgba(37, 99, 235, 0.2);
    }

    .left-access-link:hover {
      filter: brightness(0.98);
      text-decoration: none;
      transform: translateX(2px);
    }

    .left-access-link .icon {
      font-size: 0.85rem;
      letter-spacing: 0.04em;
      opacity: 0.9;
    }

    .left-access-toggle {
      display: none;
      border: 1px solid var(--border);
      background: #ffffff;
      color: #0f172a;
      border-radius: 10px;
      padding: 10px 12px;
      font-weight: 700;
      cursor: pointer;
    }

    .left-access-links {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .page-shell {
      max-width: 860px;
      margin: 0 auto;
      padding: 32px 16px;
    }

    .page-title {
      margin: 0 0 8px;
      font-size: 2.2rem;
      line-height: 1.1;
      font-weight: 800;
    }

    .page-subtitle {
      margin: 0;
      color: var(--muted);
    }

    .layout-card {
      margin-top: 24px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      box-shadow: 0 1px 2px rgba(15, 23, 42, 0.05);
      padding: 24px;
    }

    .section-note {
      margin: 0;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .field {
      margin-top: 14px;
      max-width: 560px;
    }

    .field label {
      display: block;
      margin-bottom: 6px;
      font-size: 0.95rem;
      font-weight: 600;
      color: #334155;
    }

    .field input {
      width: 100%;
      padding: 11px 12px;
      border: 1px solid #cbd5e1;
      border-radius: 10px;
      font: inherit;
      background: white;
      color: var(--text);
    }

    .field input:focus {
      outline: 2px solid rgba(37, 99, 235, 0.25);
      border-color: var(--primary);
    }

    .btn {
      margin-top: 14px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 12px 18px;
      border: 0;
      border-radius: 10px;
      background: var(--primary);
      color: white;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }

    .btn:hover {
      background: var(--primary-dark);
    }

    .insight-box {
      margin-top: 14px;
      padding: 14px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: #f8fafc;
    }

    #ai-insight {
      margin: 0;
      white-space: pre-wrap;
      line-height: 1.5;
    }

    @media (max-width: 800px) {
      .left-access {
        position: static;
        transform: none;
        padding: 12px 16px 0;
        align-items: flex-start;
      }

      .left-access-link {
        border-radius: 10px;
      }

      .left-access-toggle {
        display: inline-flex;
      }

      .left-access-links {
        margin-top: 8px;
      }

      .left-access-links[data-open="false"] {
        display: none;
      }
    }
  </style>
</head>
<body>
  <nav class="left-access" aria-label="Primary navigation">
    <button type="button" class="left-access-toggle" id="left-nav-toggle" aria-expanded="false" aria-controls="left-nav-links">
      Menu
    </button>
    <div class="left-access-links" id="left-nav-links" data-open="true">
      <a class="left-access-link" href="/dashboard"><span class="icon">DB</span><span>Dashboard</span></a>
      <a class="left-access-link" href="/add-transaction"><span class="icon">TX</span><span>Transactions</span></a>
      <a class="left-access-link active" href="/ai-insights"><span class="icon">AI</span><span>AI Insights</span></a>
    </div>
  </nav>

  <main class="page-shell">
    <h1 class="page-title">AI Insights</h1>
    <p class="page-subtitle">Generate practical advice from your transaction history.</p>

    <section class="layout-card">
      <p class="section-note">Add an optional focus prompt and generate an insight.</p>

      <div class="field">
        <label for="ai-focus">Focus (optional)</label>
        <input id="ai-focus" type="text" maxlength="120" placeholder="e.g., food spending, savings, transport">
      </div>

      <button id="generate-ai-insight" type="button" class="btn">Generate AI Insight</button>
      <p id="ai-status" class="section-note" style="margin-top: 12px;">Ready to generate insight.</p>

      <div class="insight-box">
        <p id="ai-meta" class="section-note" style="margin: 0 0 8px 0;"></p>
        <p id="ai-insight">No insight yet. Click "Generate AI Insight".</p>
      </div>
    </section>
  </main>

  <script>
    (function () {
      const toggle = document.getElementById('left-nav-toggle');
      const links = document.getElementById('left-nav-links');
      if (!toggle || !links) return;

      function syncByViewport() {
        if (window.innerWidth <= 800) {
          links.dataset.open = links.dataset.open || 'false';
          toggle.setAttribute('aria-expanded', links.dataset.open === 'true' ? 'true' : 'false');
          return;
        }

        links.dataset.open = 'true';
        toggle.setAttribute('aria-expanded', 'true');
      }

      links.dataset.open = window.innerWidth <= 800 ? 'false' : 'true';
      syncByViewport();

      toggle.addEventListener('click', () => {
        const open = links.dataset.open === 'true';
        links.dataset.open = open ? 'false' : 'true';
        toggle.setAttribute('aria-expanded', open ? 'false' : 'true');
      });

      window.addEventListener('resize', syncByViewport);
    })();
  </script>

  <script src="/static/js/add-transaction.js?v=13"></script>
</body>
</html>
