<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SmartSpend AI - Add Transaction</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body class="bg-slate-100 min-h-screen">
  <main class="max-w-5xl mx-auto px-4 py-8 space-y-6">
    <div class="bg-white rounded-2xl shadow-sm p-6 md:p-8">
      <div class="flex items-center justify-between gap-3 mb-6">
        <div>
          <h1 class="text-2xl font-bold text-slate-900">SmartSpend AI</h1>
          <p class="text-slate-600">Feature 1: Add and store transactions</p>
        </div>
        <a href="/transactions" class="text-sm text-blue-600 hover:underline">View API JSON</a>
      </div>

      <form id="transaction-form" class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div>
          <label for="amount" class="block text-sm font-medium text-slate-700">Amount</label>
          <input id="amount" name="amount" type="number" step="0.01" min="0.01" required
                 class="mt-1 w-full rounded-lg border border-slate-300 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400">
        </div>

        <div>
          <label for="type" class="block text-sm font-medium text-slate-700">Type</label>
          <select id="type" name="type" required
                  class="mt-1 w-full rounded-lg border border-slate-300 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400">
            <option value="income">Income</option>
            <option value="expense">Expense</option>
          </select>
        </div>

        <div>
          <label for="category" class="block text-sm font-medium text-slate-700">Category</label>
          <select id="category" name="category" required
                  class="mt-1 w-full rounded-lg border border-slate-300 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400">
            <option value="Food &amp; Drink" selected>Food &amp; Drink</option>
            <option value="Transport">Transport</option>
            <option value="Entertainment">Entertainment</option>
            <option value="Shopping">Shopping</option>
            <option value="Health">Health</option>
            <option value="Salary">Salary</option>
            <option value="Utility">Utility</option>
            <option value="Housing">Housing</option>
            <option value="Others">Others</option>
          </select>
        </div>

        <div>
          <label for="description" class="block text-sm font-medium text-slate-700">Description (Optional)</label>
          <input id="description" name="description" type="text" maxlength="500"
                 placeholder="Add a note for this transaction"
                 class="mt-1 w-full rounded-lg border border-slate-300 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400">
        </div>

        <div>
          <label for="date" class="block text-sm font-medium text-slate-700">Date</label>
          <input id="date" name="date" type="date" required
                 class="mt-1 w-full rounded-lg border border-slate-300 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400">
        </div>

        <div class="md:col-span-2">
          <button type="submit"
                  class="w-full md:w-auto rounded-lg bg-blue-600 text-white px-5 py-2.5 font-medium hover:bg-blue-700 transition">
            Save Transaction
          </button>
        </div>
      </form>

      <p id="message" class="mt-4 text-sm"></p>
    </div>

    <section class="bg-white rounded-2xl shadow-sm p-6 md:p-8 space-y-5">
      <div class="flex flex-col gap-4 md:flex-row md:items-end md:justify-between">
        <div>
          <h2 class="text-xl font-semibold text-slate-900">Transaction History</h2>
          <p id="table-summary" class="text-sm text-slate-600">Loading transactions...</p>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 w-full md:max-w-xl">
          <div>
            <label for="filter-type" class="block text-sm font-medium text-slate-700">Filter by Type</label>
            <select id="filter-type"
                    class="mt-1 w-full rounded-lg border border-slate-300 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400">
              <option value="all">All Types</option>
              <option value="income">Income</option>
              <option value="expense">Expense</option>
            </select>
          </div>

          <div>
            <label for="filter-category" class="block text-sm font-medium text-slate-700">Filter by Category</label>
            <select id="filter-category"
                    class="mt-1 w-full rounded-lg border border-slate-300 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400">
              <option value="all">All Categories</option>
            </select>
          </div>
        </div>
      </div>

      <div class="overflow-x-auto rounded-xl border border-slate-200">
        <table class="min-w-full divide-y divide-slate-200">
          <thead class="bg-slate-50">
            <tr>
              <th scope="col" class="px-4 py-3 text-left text-xs font-semibold uppercase tracking-wide text-slate-500">Date</th>
              <th scope="col" class="px-4 py-3 text-left text-xs font-semibold uppercase tracking-wide text-slate-500">Type</th>
              <th scope="col" class="px-4 py-3 text-left text-xs font-semibold uppercase tracking-wide text-slate-500">Category</th>
              <th scope="col" class="px-4 py-3 text-left text-xs font-semibold uppercase tracking-wide text-slate-500">Description</th>
              <th scope="col" class="px-4 py-3 text-right text-xs font-semibold uppercase tracking-wide text-slate-500">Amount</th>
              <th scope="col" class="px-4 py-3 text-right text-xs font-semibold uppercase tracking-wide text-slate-500">Actions</th>
            </tr>
          </thead>
          <tbody id="transactions-table-body" class="divide-y divide-slate-100 bg-white">
            <tr>
              <td colspan="6" class="px-4 py-6 text-center text-sm text-slate-500">Loading transactions...</td>
            </tr>
          </tbody>
        </table>
      </div>

      <div class="flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between">
        <p id="page-indicator" class="text-sm text-slate-600"></p>
        <div class="flex items-center gap-2">
          <button id="prev-page" type="button"
                  class="rounded-lg border border-slate-300 px-4 py-2 text-sm font-medium text-slate-700 hover:bg-slate-50 disabled:cursor-not-allowed disabled:opacity-50">
            Previous
          </button>
          <button id="next-page" type="button"
                  class="rounded-lg border border-slate-300 px-4 py-2 text-sm font-medium text-slate-700 hover:bg-slate-50 disabled:cursor-not-allowed disabled:opacity-50">
            Next
          </button>
        </div>
      </div>
    </section>

  </main>

  <script src="/static/js/add-transaction.js?v=5"></script>
</body>
</html>
