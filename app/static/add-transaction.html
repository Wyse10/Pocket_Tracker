<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pocket Tracker - Add Transaction</title>
  <link rel="stylesheet" href="/static/css/styles.css">
  <link rel="stylesheet" href="/static/css/profile-avatar.css?v=1">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Manrope:wght@400;600;700;800&display=swap');

    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --border: #dbe3ef;
      --text: #111827;
      --muted: #4b5563;
      --primary: #0f4c81;
      --primary-dark: #0b3c66;
      --green: #0f766e;
      --red: #be123c;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background:
        radial-gradient(circle at top left, rgba(15, 76, 129, 0.09), transparent 34%),
        radial-gradient(circle at bottom right, rgba(180, 83, 9, 0.07), transparent 38%),
        var(--bg);
      color: var(--text);
      font-family: "Manrope", "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      min-height: 100vh;
    }

    a {
      color: var(--primary);
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    .page-shell {
      max-width: 1120px;
      margin: 0 auto;
      padding: clamp(18px, 3.5vw, 32px) clamp(12px, 3vw, 16px);
      animation: rise-in 460ms cubic-bezier(0.2, 0.7, 0.2, 1) both;
    }

    .page-title {
      margin: 0 0 8px;
      font-size: clamp(1.95rem, 4.2vw, 2.4rem);
      line-height: 1.1;
      font-weight: 800;
      font-family: "Fraunces", Georgia, "Times New Roman", serif;
      letter-spacing: -0.03em;
      text-wrap: balance;
      overflow-wrap: anywhere;
    }

    .page-subtitle {
      margin: 0;
      font-size: 1.05rem;
      color: var(--muted);
    }

    .metric-grid {
      display: grid;
      grid-template-columns: repeat(1, minmax(0, 1fr));
      gap: 16px;
      margin: 24px 0;
    }

    @media (min-width: 640px) {
      .metric-grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      box-shadow: 0 14px 34px rgba(17, 24, 39, 0.08);
      padding: 20px;
    }

    .metric-label {
      margin: 0;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #64748b;
    }

    .metric-value {
      margin: 10px 0 0;
      font-size: clamp(1.45rem, 4.8vw, 1.75rem);
      line-height: 1.2;
      font-weight: 800;
      letter-spacing: -0.02em;
    }

    .layout-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      box-shadow: 0 14px 34px rgba(17, 24, 39, 0.08);
      padding: 24px;
      margin-bottom: 24px;
    }

    .section-head {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: end;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .section-title {
      margin: 0;
      font-size: 1.35rem;
      line-height: 1.2;
      font-family: "Fraunces", Georgia, "Times New Roman", serif;
      letter-spacing: -0.02em;
      text-wrap: balance;
    }

    .section-note {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .form-grid,
    .filter-grid {
      display: grid;
      gap: 16px;
    }

    .form-grid {
      grid-template-columns: repeat(1, minmax(0, 1fr));
    }

    @media (min-width: 768px) {
      .form-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .filter-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    .field label {
      display: block;
      margin-bottom: 6px;
      font-size: 0.95rem;
      font-weight: 600;
      color: #334155;
    }

    .field input,
    .field select {
      width: 100%;
      padding: 11px 12px;
      border: 1px solid #cbd5e1;
      border-radius: 10px;
      font: inherit;
      background: white;
      color: var(--text);
    }

    .field input:focus,
    .field select:focus {
      outline: 2px solid rgba(37, 99, 235, 0.25);
      border-color: var(--primary);
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 12px 18px;
      border: 0;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--primary), #155e9a);
      color: white;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }

    .btn:hover {
      background: linear-gradient(135deg, var(--primary-dark), #134f81);
    }

    .btn-secondary {
      background: white;

    @keyframes rise-in {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (prefers-reduced-motion: reduce) {
      .page-shell {
        animation: none;
      }
    }
      color: #334155;
      border: 1px solid #cbd5e1;
    }

    .btn-secondary:hover {
      background: #f8fafc;
    }

    .top-links {
      display: flex;
      gap: 12px;
      justify-content: flex-end;
      align-items: center;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .top-links-row {
      display: flex;
      align-items: center;
      gap: 12px;
      width: 100%;
      flex-wrap: wrap;
    }

    .user-greeting {
      margin-right: auto;
      color: var(--muted);
      font-weight: 700;
      font-size: 0.92rem;
    }

    .quick-dashboard-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 10px 14px;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--primary), #155e9a);
      color: #ffffff;
      font-weight: 700;
      text-decoration: none;
    }

    .quick-dashboard-link:hover {
      background: linear-gradient(135deg, var(--primary-dark), #134f81);
      text-decoration: none;
    }

    .table-wrap {
      overflow-x: auto;
      border: 1px solid var(--border);
      border-radius: 16px;
    }
      letter-spacing: -0.02em;

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      overflow: hidden;
    }

    th,
    td {
      padding: 14px 16px;
      border-bottom: 1px solid #e2e8f0;
      text-align: left;
      font-size: 0.95rem;
    }

    th {
      background: #f8fafc;
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #64748b;
    }

    .pagination {
      display: flex;
      gap: 12px;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      margin-top: 16px;
    }

    .hidden-js-warning {
      margin-top: 12px;
      padding: 12px 14px;
      background: #fff7ed;
      border: 1px solid #fdba74;
      border-radius: 12px;
      color: #9a3412;
      font-size: 0.95rem;
    }

    tbody tr:hover {
      background: #f8fafc;
    }

    td[data-label="Amount"] {
      font-weight: 700;
    }

    td[data-label="Actions"] {
      text-align: right;
    }

    .btn,
    .btn-secondary,
    .quick-dashboard-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 10px 14px;
      border: 0;
      border-radius: 10px;
      background: var(--primary);
      color: #ffffff;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
    }

    .btn:hover,
    .btn-secondary:hover,
    .quick-dashboard-link:hover {
      background: var(--primary-dark);
      text-decoration: none;
    }

    @media (max-width: 640px) {
      .page-shell {
        padding: 16px 12px 24px;
      }

      .page-title {
        font-size: clamp(1.8rem, 8vw, 2.15rem);
      }

      .metric-grid,
      .form-grid,
      .filter-grid {
        gap: 12px;
      }

      .card,
      .layout-card {
        padding: 16px;
        border-radius: 18px;
      }

      .top-links,
      .top-links-row,
      .section-head,
      .pagination {
        flex-direction: column;
        align-items: stretch;
      }

      .user-greeting {
        margin-right: 0;
        width: 100%;
      }

      .quick-dashboard-link,
      .btn,
      .btn-secondary {
        width: 100%;
        min-height: 48px;
      }

      .section-head > div,
      .filter-grid {
        width: 100% !important;
      }

      .table-wrap {
        overflow: visible;
        border: 0;
      }

      table,
      thead,
      tbody,
      tr,
      th,
      td {
        display: block;
        width: 100%;
      }

      thead {
        position: absolute;
        width: 1px;
        height: 1px;
        margin: -1px;
        padding: 0;
        border: 0;
        overflow: hidden;
        clip: rect(0 0 0 0);
        clip-path: inset(50%);
      }

      tbody tr {
        margin-bottom: 12px;
        border: 1px solid var(--border);
        border-radius: 16px;
        overflow: hidden;
        background: #ffffff;
      }

      tbody tr.table-empty-row {
        margin-bottom: 0;
      }

      tbody tr.table-empty-row td {
        display: block;
        padding: 16px;
        text-align: center;
      }

      tbody tr.table-empty-row td::before {
        content: '';
      }

      td {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        padding: 10px 14px;
        text-align: right;
        border-bottom: 1px solid #e2e8f0;
        white-space: normal;
        word-break: break-word;
      }

      td:last-child {
        border-bottom: 0;
      }

      td::before {
        content: attr(data-label);
        flex: 0 0 auto;
        font-size: 0.72rem;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: #64748b;
        text-align: left;
      }

      td[data-label="Actions"] {
        text-align: left;
      }

      td[data-label="Actions"] button {
        width: 100%;
      }

      td[data-label="Type"] span {
        margin-left: auto;
      }

      .field input,
      .field select,
      .btn,
      .btn-secondary,
      .quick-dashboard-link {
        font-size: 16px;
      }

      .field input,
      .field select {
        min-height: 48px;
      }

      .pagination > div {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main class="page-shell">
    <div class="mb-8">
      <h1 class="page-title">Pocket Tracker</h1>
      <p class="page-subtitle">Track your finances and get AI-powered insights</p>
    </div>

    <section class="metric-grid">
      <article class="card">
        <p class="metric-label">Income (Overall)</p>
        <p id="metric-income-total" class="metric-value" style="color: var(--green);">GH₵0.00</p>
      </article>

      <article class="card">
        <p class="metric-label">Expense (Overall)</p>
        <p id="metric-expense-total" class="metric-value" style="color: var(--red);">GH₵0.00</p>
      </article>

      <article class="card">
        <p class="metric-label">Balance (Overall)</p>
        <p id="metric-total-balance" class="metric-value">GH₵0.00</p>
      </article>

    </section>

    <div class="layout-card">
      <div class="top-links">
        <div class="top-links-row">
          <span id="user-greeting" class="user-greeting"></span>
          <a class="quick-dashboard-link" href="/dashboard">Open Dashboard</a>
          <a class="quick-dashboard-link" href="/ai-insights">AI Insights</a>
          <button id="logout-button" type="button" class="quick-dashboard-link">Logout</button>
        </div>
      </div>

      <form id="transaction-form" class="form-grid">
        <div class="field">
          <label for="amount">Amount</label>
          <input id="amount" name="amount" type="number" step="1" min="10" required>
        </div>

        <div class="field">
          <label for="type">Type</label>
          <select id="type" name="type" required>
            <option value="income">Income</option>
            <option value="expense">Expense</option>
          </select>
        </div>

        <div class="field">
          <label for="category">Category</label>
          <select id="category" name="category" required>
            <option value="Salary" selected>Salary</option>
            <option value="Freelance">Freelance</option>
            <option value="Business">Business</option>
            <option value="Investment Returns">Investment Returns</option>
            <option value="Gift Received">Gift Received</option>
            <option value="Others">Others</option>
          </select>
        </div>

        <div class="field">
          <label for="description">Description (Optional)</label>
          <input id="description" name="description" type="text" maxlength="500" placeholder="Add a note for this transaction">
        </div>

        <div class="field">
          <label for="date">Date</label>
          <input id="date" name="date" type="date" required>
        </div>

        <div style="grid-column: 1 / -1;">
          <button type="submit" class="btn">
            Save Transaction
          </button>
        </div>
      </form>

      <p id="message" style="margin-top: 16px; font-size: 0.95rem;"></p>
    </div>

    <section class="layout-card">
      <div class="section-head">
        <div>
          <h2 class="section-title">Transaction History</h2>
          <p id="table-summary" class="section-note">Loading transactions...</p>
        </div>

        <div class="filter-grid" style="width: min(100%, 520px);">
          <div class="field">
            <label for="filter-type">Filter by Type</label>
            <select id="filter-type">
              <option value="all">All Types</option>
              <option value="income">Income</option>
              <option value="expense">Expense</option>
            </select>
          </div>

          <div class="field">
            <label for="filter-category">Filter by Category</label>
            <select id="filter-category">
              <option value="all">All Categories</option>
            </select>
          </div>
        </div>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th scope="col">Date</th>
              <th scope="col">Type</th>
              <th scope="col">Category</th>
              <th scope="col">Description</th>
              <th scope="col">Amount</th>
              <th scope="col">Actions</th>
            </tr>
          </thead>
          <tbody id="transactions-table-body">
            <tr class="table-empty-row">
              <td colspan="6" style="padding: 16px; text-align: center; color: #64748b;">Loading transactions...</td>
            </tr>
          </tbody>
        </table>
      </div>

      <div class="pagination">
        <p id="page-indicator" class="section-note"></p>
        <div style="display:flex; gap:8px; flex-wrap:wrap; width:100%; justify-content:flex-end;">
          <button id="prev-page" type="button" class="btn btn-secondary">
            Previous
          </button>
          <button id="next-page" type="button" class="btn btn-secondary">
            Next
          </button>
        </div>
      </div>
    </section>

    <noscript>
      <div class="hidden-js-warning">JavaScript is disabled, so the transaction list cannot load, but the page content should still be visible.</div>
    </noscript>

  </main>

  <script src="/static/js/shared/api-client.js?v=2"></script>
  <script src="/static/js/shared/auth.js?v=1"></script>
  <script src="/static/js/shared/profile-avatar.js?v=1"></script>
  <script src="/static/js/add-transaction.js?v=16"></script>
</body>
</html>
